aid: solr
name: Apache Solr
description: >-
  Apache Solr is a popular, open source enterprise search platform built on
  Apache Lucene that provides full-text search, hit highlighting, faceted
  search, dynamic clustering, database integration, and rich document handling.
  Solr powers the search and navigation features of many of the world's largest
  internet sites and is highly scalable and reliable. Solr exposes a
  comprehensive HTTP/REST API (v1 and v2) for indexing, querying, and managing
  cores, collections, and configurations.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - Search
  - Enterprise Search
  - Full-Text Search
  - Open Source
  - Lucene
  - Indexing
url: >-
