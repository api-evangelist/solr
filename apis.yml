modified: '2026-05-11'
specificationVersion: '0.19'
apis:
  - aid: solr:rest-api
    name: Apache Solr REST API
    description: >-
      HTTP/REST API for Apache Solr providing endpoints for querying,
      indexing, schema management, collections administration, and core
      administration. The v2 API uses RESTful resource paths under /api
      while the legacy v1 API uses /solr endpoints. Authentication is
      pluggable and supports Basic, JWT, and Certificate authentication.
    humanURL: https://solr.apache.org/guide/
    baseURL: http://localhost:8983/api
    tags:
      - Search
      - Indexing
      - Collections
      - Cores
      - Schema
      - Query
    properties:
      - type: Documentation
        url: https://solr.apache.org/guide/
